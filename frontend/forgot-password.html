<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - NIMS University CMS</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/png" href="https://ozdyn7q2xl.in1.agent.nopaperforms.com/media/uploads/agent_icon/0cf600ab47dd44459bbf5638251ee018.jpg">
  
  <style>
    :root {
      --color-navy-950: #0a0f1a;
      --color-navy-900: #0f172a;
      --color-navy-800: #1e293b;
      --color-navy-700: #334155;
      --color-navy-600: #475569;
      --color-cyan-400: #D90429;
      --color-cyan-glow: rgba(217, 4, 41, 0.1);
      
      --color-gold: #c5a880;
      --color-gold-dark: #8c7355;
      
      --color-white: #f8fafc;
      --color-slate-300: #cbd5e1;
      --color-slate-400: #94a3b8;
      
      --color-card: rgba(15, 23, 42, 0.7);
      --color-border: rgba(255, 255, 255, 0.1);
      --color-border-bright: rgba(217, 4, 41, 0.3);
      
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      
      --font-display: 'Playfair Display', serif;
      --font-ui: 'DM Sans', sans-serif;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-ui);
      background-color: var(--color-navy-950);
      color: var(--color-white);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient Background matching login */
    .ambient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      pointer-events: none;
      animation: float 10s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: rgba(217, 4, 41, 0.08); top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: rgba(197, 168, 128, 0.05); bottom: -100px; right: -50px; animation-delay: -5s; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, 30px) scale(1.05); }
    }

    .auth-container {
      width: 100%;
      max-width: 440px;
      z-index: 10;
    }

    .auth-brand {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 30px;
    }

    .brand-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--color-gold), var(--color-gold-dark));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: var(--color-navy-950);
      margin-bottom: 12px;
      box-shadow: 0 4px 20px rgba(197, 168, 128, 0.3);
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(135deg, var(--color-gold), #EF233C, var(--color-gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-align: center;
    }

    .brand-sub {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--color-slate-400);
      text-align: center;
    }

    .auth-card {
      background: var(--color-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 60px rgba(217, 4, 41, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }
    
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
      border-radius: 0 0 4px 4px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--color-white);
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--color-slate-400);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--color-slate-400);
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i {
      position: absolute;
      left: 14px;
      color: var(--color-slate-400);
      font-size: 14px;
      transition: color 0.3s;
    }

    .form-control {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      padding: 12px 14px 12px 38px;
      font-family: inherit;
      font-size: 14px;
      color: var(--color-white);
      transition: all 0.3s;
    }

    .form-control:focus {
      outline: none;
      border-color: var(--color-cyan-400);
      background: rgba(217, 4, 41, 0.03);
      box-shadow: 0 0 0 3px var(--color-cyan-glow);
    }

    .form-control:focus + i,
    .form-control:not(:placeholder-shown) + i {
      color: var(--color-cyan-400);
    }

    .btn-submit {
      width: 100%;
      background: var(--color-cyan-400);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      box-shadow: 0 4px 12px rgba(217, 4, 41, 0.3);
      margin-top: 10px;
    }

    .btn-submit:hover {
      background: #EF233C;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(217, 4, 41, 0.4);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--color-slate-400);
    }

    .auth-toggle-link {
      color: var(--color-cyan-400);
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s;
      text-decoration: none;
    }

    .auth-toggle-link:hover {
      color: #EF233C;
      text-decoration: underline;
    }

    /* Error and Success banners */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: shake 0.4s ease;
    }

    .alert-danger {
      background-color: rgba(242, 95, 92, 0.1);
      border: 1px solid rgba(242, 95, 92, 0.2);
      color: #FCA5A5; /* slightly brighter for dark mode */
    }

    .alert-success {
      background-color: rgba(34, 211, 163, 0.1);
      border: 1px solid rgba(34, 211, 163, 0.2);
      color: #6EE7B7;
      animation: none;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Views */
    .view-step {
      display: none;
    }
    
    .view-step.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }
  </style>
</head>
<body>

  <div class="ambient-orb orb-1"></div>
  <div class="ambient-orb orb-2"></div>

  <div class="auth-container">
    <div class="auth-brand">
      <img src="https://ozdyn7q2xl.in1.agent.nopaperforms.com/media/uploads/agent_icon/0cf600ab47dd44459bbf5638251ee018.jpg" alt="NIMS University Logo" height="150" width="140" style="margin-bottom: 12px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
      <div class="brand-name">NIMS University</div>
      <div class="brand-divider"></div>
      <div class="brand-sub">Rajasthan, Jaipur</div>
    </div>

    <div class="auth-card">
      <div id="alert-container"></div>

      <!-- Step 1: Request OTP -->
      <div id="step-1" class="view-step active">
        <h2 class="card-title">Reset Password</h2>
        <p class="card-subtitle">Enter your registered email address to receive a one-time password (OTP).</p>

        <form id="request-otp-form">
          <div class="form-group">
            <label class="form-label" for="email">Email Address</label>
            <div class="input-wrapper">
              <input type="email" id="email" class="form-control" placeholder="name@domain.com" required>
              <i class="far fa-envelope"></i>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btn-request">
            <span>Send OTP</span>
            <i class="fas fa-paper-plane"></i>
          </button>
        </form>
      </div>

      <!-- Step 2: Verify OTP & New Password -->
      <div id="step-2" class="view-step">
        <h2 class="card-title">Set New Password</h2>
        <p class="card-subtitle">Enter the 6-digit OTP sent to your email and your new password.</p>

        <form id="reset-password-form">
          <div class="form-group">
            <label class="form-label" for="otp">One-Time Password (OTP)</label>
            <div class="input-wrapper">
              <input type="text" id="otp" class="form-control" placeholder="123456" required autocomplete="off" maxlength="6" pattern="[0-9]{6}">
              <i class="far fa-key"></i>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="new-password">New Password</label>
            <div class="input-wrapper">
              <input type="password" id="new-password" class="form-control" placeholder="••••••••" required minlength="6">
              <i class="far fa-lock"></i>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btn-reset">
            <span>Reset Password</span>
            <i class="fas fa-check-circle"></i>
          </button>
        </form>
      </div>

      <div class="auth-toggle">
        Remember your password? <a href="login.html" class="auth-toggle-link">Back to Login</a>
      </div>
    </div>
  </div>

  <script>
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const requestForm = document.getElementById('request-otp-form');
    const resetForm = document.getElementById('reset-password-form');
    const alertContainer = document.getElementById('alert-container');
    
    const emailInput = document.getElementById('email');
    const btnRequest = document.getElementById('btn-request');
    const btnReset = document.getElementById('btn-reset');
    
    let savedEmail = '';

    function showAlert(msg, type = 'danger') {
      if (!msg) {
        alertContainer.innerHTML = '';
        return;
      }
      const icon = type === 'success' ? 'fa-circle-check' : 'fa-circle-exclamation';
      alertContainer.innerHTML = `
        <div class="alert alert-${type}">
          <i class="fas ${icon}"></i>
          <span>${msg}</span>
        </div>
      `;
    }

    requestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = emailInput.value.trim();
      
      showAlert('', '');
      btnRequest.disabled = true;
      btnRequest.innerHTML = '<span>Sending...</span><i class="fas fa-spinner fa-spin"></i>';
      
      try {
        // Since we are deploying frontend and backend together on Render, we can safely use the relative path
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showAlert(data.message, 'success');
          savedEmail = email;
          // Switch view
          setTimeout(() => {
            step1.classList.remove('active');
            step2.classList.add('active');
            showAlert('', ''); // clear message on next step
          }, 1500);
        } else {
          showAlert(data.message || 'Error sending OTP', 'danger');
        }
      } catch (error) {
        showAlert('Server error. Please try again.', 'danger');
      } finally {
        btnRequest.disabled = false;
        btnRequest.innerHTML = '<span>Send OTP</span><i class="fas fa-paper-plane"></i>';
      }
    });

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const otp = document.getElementById('otp').value.trim();
      const newPassword = document.getElementById('new-password').value;
      
      showAlert('', '');
      btnReset.disabled = true;
      btnReset.innerHTML = '<span>Resetting...</span><i class="fas fa-spinner fa-spin"></i>';
      
      try {
        // Using relative path
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: savedEmail, otp, newPassword })
        });
        
        const data = await res.json();
        
        if (data.success) {
          showAlert('Password reset successfully! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 2000);
        } else {
          showAlert(data.message || 'Error resetting password', 'danger');
        }
      } catch (error) {
        showAlert('Server error. Please try again.', 'danger');
      } finally {
        // keep button disabled on success
        if (!alertContainer.innerHTML.includes('alert-success')) {
          btnReset.disabled = false;
          btnReset.innerHTML = '<span>Reset Password</span><i class="fas fa-check-circle"></i>';
        }
      }
    });
  </script>
</body>
</html>
